<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to DOOM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
        }
        
        h1 {
            font-size: 4rem;
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 107, 107, 0.8); }
            50% { text-shadow: 0 0 40px rgba(255, 107, 107, 1); }
        }
        
        p {
            font-size: 1.2rem;
            color: #ddd;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .button {
            display: inline-block;
            padding: 12px 30px;
            background-color: #ff6b6b;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin: 10px 5px;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .button:hover {
            background-color: #ff5252;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.6);
        }
        
        .secondary {
            background-color: #444;
        }
        
        .secondary:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 DOOM</h1>
        <p>Welcome to your GitHub Pages deployment!</p>
        <p>Your repository is now live and ready to go.</p>
        <a href="#" class="button">Get Started</a>
        <a href="https://github.com/gautham2008-raj/doom" class="button secondary">View on GitHub</a>
    </div>
</body>
</html>
